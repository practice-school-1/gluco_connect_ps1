databases:
  - name: glucoconnect-db
    plan: free
    databaseName: glucoconnect_db
    user: glucoconnect

services:
  - type: web
    name: glucoconnect-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: glucoconnect-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
